<div class="container-fluid">

 <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-3">

  <!-- LEFT -->
  <div>
    <h3 class="fw-bold mb-0">Leads</h3>
    <small class="text-muted">Manage and track your leads</small>
  </div>

  <!-- RIGHT -->
  <div class="header-controls d-flex align-items-center gap-3 flex-wrap">

    <!-- Search -->
    <div class="control-group">
      <label>Search:</label>
      <input type="text"
             class="form-control"
             placeholder="Search..."
             [(ngModel)]="searchText"
             (input)="onSearch()" />
    </div>

    <!-- Filter -->
    <div class="control-group">
      <label>Filter:</label>
      <select class="form-select"
              [(ngModel)]="selectedSource"
              (change)="onFilterChange()">
        <option value="">All</option>
        <option value="Comment">Comment</option>
        <option value="DM">DM</option>
      </select>
    </div>

    <!-- Export -->
    <button class="btn btn-success export-btn"
            (click)="exportCSV()">
      Export CSV
    </button>

  </div>
</div>

  <!-- 📊 AG Grid -->
  <ag-grid-angular
   #agGrid
  [theme]="'legacy'"
  class="ag-theme-quartz"
    style="width: 100%; height: 508px;"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [defaultColDef]="defaultColDef"
 [headerHeight]="42"
  [rowHeight]="35"
      [pagination]="true"
        [quickFilterText]="searchText"
        
  [paginationPageSize]="10"
    (gridReady)="onGridReady($event)"
    (rowClicked)="onRowClicked($event)">
  </ag-grid-angular>

 
 

</div>

<!-- 🌫 Overlay -->
<div class="drawer-overlay"
     *ngIf="isDrawerOpen"
     (click)="isDrawerOpen = false">

  <!-- 👉 SIDE PANEL -->
  <div class="drawer-side"
       (click)="$event.stopPropagation()">

   <div class="drawer-header position-relative">
  <h5 class="mb-0">Lead Details</h5>

  <!-- ❌ Close Button -->
  <button class="btn-close custom-close"
          (click)="isDrawerOpen=false"></button>
</div>

    <!-- BODY -->
    <div class="drawer-body" *ngIf="selectedLead">

      <p><strong>Name:</strong> {{selectedLead.name}}</p>
      <p><strong>Instagram:</strong> {{selectedLead.instagram}}</p>
      <p><strong>Source:</strong> {{selectedLead.source}}</p>

      <!-- TAGS -->
      <div>
        <p><strong>Tags:</strong>
        <span class="badge bg-primary me-1"
              *ngFor="let tag of selectedLead.tags">
          {{tag}}
        </span></p>
      </div>

      <!-- ADD TAG -->
      <div class="mt-3 d-flex gap-2">
        <input type="text"
               class="form-control"
               placeholder="Add Tag"
               [(ngModel)]="newTag">
        <button class="btn btn-primary"
                (click)="addTag()">Add</button>
      </div>

      <!-- DM SECTION -->
      <div *ngIf="isDMMode" class="mt-3">

        <textarea class="form-control mb-2"
                  rows="3"
                  placeholder="Type your message..."
                  [(ngModel)]="manualMessage"></textarea>

        <div class="d-flex gap-2">
          <button class="btn btn-success w-100"
                  (click)="sendDM()">
            Send Message 🚀
          </button>

          <button class="btn btn-outline-secondary"
                  (click)="isDMMode=false">
            Cancel
          </button>
        </div>
      </div>

      <button *ngIf="!isDMMode"
              class="btn btn-dark w-100 mt-3"
              (click)="isDMMode=true">
        Send Manual DM
      </button>

    </div>
  </div>
</div>
