<div class="pricing-container mt-5">
  <div class="pricing-header text-center mb-5">
    <h2>Choose Your Plan</h2>
    <p >Simple pricing for everyone. Upgrade, downgrade, or cancel anytime.</p>
  </div>

  <div class="pricing-cards">
    <div class="pricing-card" 
         *ngFor="let plan of plans" 
         [class.popular]="plan.popular" 
         [class.selected]="selectedPlan === plan.id">
         
      <div class="popular-badge" *ngIf="plan.popular">Most Popular</div>

      <div class="card-header">
        <h3 class="plan-name">{{ plan.name }}</h3>
        <p class="plan-description">{{ plan.description }}</p>
        <div class="plan-price">
          <span class="currency">$</span><span class="amount">{{ plan.price }}</span><span class="period">/mo</span>
        </div>
      </div>

      <div class="card-body">
        <ul class="feature-list">
          <li *ngFor="let feature of plan.features" [class.not-included]="!feature.included">
            <span class="icon" [class.text-success]="feature.included" [class.text-danger]="!feature.included">
              {{ feature.included ? '✔' : '✖' }}
            </span>
            <span class="text">{{ feature.name }}</span>
          </li>
        </ul>
      </div>

      <div class="card-footer">
        <button class="btn" 
                [class.btn-primary]="plan.popular || selectedPlan === plan.id" 
                [class.btn-outline-primary]="!plan.popular && selectedPlan !== plan.id"
                (click)="changePlan(plan.id)">
          {{ selectedPlan === plan.id ? 'Current Plan' : 'Choose ' + plan.name }}
        </button>
      </div>
    </div>
  </div>
</div>
