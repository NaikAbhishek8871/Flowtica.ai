<div class="container-fluid px-4 py-3">

  <!-- PAGE HEADER -->
  <div class="mb-4">
    <h3 class="fw-bold title mb-1">Security & Authentication</h3>
    <small class="subtitle">Manage your password and secure your account</small>
  </div>

  <div class="row g-4">

    <!-- 🔐 LEFT: CHANGE PASSWORD -->
    <div class="col-lg-7">
      <div class="card-dark p-4 h-100">

        <!-- ALERT -->
        <div *ngIf="message.text"
             class="mb-3 p-3 rounded-3"
             [ngClass]="{
               'bg-success text-white': message.type === 'success',
               'bg-danger text-white': message.type === 'error',
               'bg-info text-white': message.type === 'info'
             }">
          {{ message.text }}
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <h5 class="fw-bold mb-0">Change Password</h5>
          <button class="btn btn-sm btn-soft" (click)="forgotPassword()">
            Forgot Password?
          </button>
        </div>

        <div class="row g-3">

          <!-- CURRENT -->
          <div class="col-12">
            <label class="card-label">Current Password</label>
            <div class="position-relative">
              <input [type]="showPassword.current ? 'text' : 'password'"
                     [(ngModel)]="password.current"
                     class="form-control bg-transparent text-white border"
                     style="border-color: rgba(255,255,255,0.08); padding-right:40px;">
              
              <span class="position-absolute top-50 end-0 translate-middle-y px-3"
                    style="cursor:pointer;"
                    (click)="toggleVisibility('current')">
                👁️
              </span>
            </div>
          </div>

          <!-- NEW -->
          <div class="col-12">
            <label class="card-label">New Password</label>
            <div class="position-relative">
              <input [type]="showPassword.new ? 'text' : 'password'"
                     [(ngModel)]="password.new"
                     class="form-control bg-transparent text-white border"
                     style="border-color: rgba(255,255,255,0.08); padding-right:40px;">
              
              <span class="position-absolute top-50 end-0 translate-middle-y px-3"
                    (click)="toggleVisibility('new')">👁️</span>
            </div>
          </div>

          <!-- CONFIRM -->
          <div class="col-12">
            <label class="card-label">Confirm Password</label>
            <div class="position-relative">
              <input [type]="showPassword.confirm ? 'text' : 'password'"
                     [(ngModel)]="password.confirm"
                     class="form-control bg-transparent text-white border"
                     [ngClass]="{
                       'border-success': password.confirm && password.new === password.confirm,
                       'border-danger': password.confirm && password.new !== password.confirm
                     }"
                     style="border-color: rgba(255,255,255,0.08); padding-right:40px;">
              
              <span class="position-absolute top-50 end-0 translate-middle-y px-3"
                    (click)="toggleVisibility('confirm')">👁️</span>
            </div>
          </div>

          <!-- BUTTON -->
          <div class="col-12 mt-2">
            <button class="btn btn-glow w-100 py-2 fw-semibold"
                    (click)="changePassword()"
                    [disabled]="!password.current || !password.new || !password.confirm || password.new !== password.confirm">
              Update Password
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- 🛡️ RIGHT: PASSWORD RULES -->
    <div class="col-lg-5">
      <div class="card-dark p-4 h-100">

        <h5 class="fw-bold mb-3">Password Rules</h5>
        <p class="text-muted small mb-4">
          Your password should be strong and secure.
        </p>

        <div class="d-flex flex-column gap-3">

          <div class="d-flex align-items-center">
            <span class="me-3"
                  [ngClass]="hasMinLength ? 'text-success' : 'text-secondary'">
              ✔
            </span>
            <span [ngClass]="hasMinLength ? 'text-success' : 'text-muted'">
              Minimum 8 characters
            </span>
          </div>

          <div class="d-flex align-items-center">
            <span class="me-3"
                  [ngClass]="hasUpper ? 'text-success' : 'text-secondary'">
              ✔
            </span>
            <span [ngClass]="hasUpper ? 'text-success' : 'text-muted'">
              One uppercase letter
            </span>
          </div>

          <div class="d-flex align-items-center">
            <span class="me-3"
                  [ngClass]="hasNumberOrSymbol ? 'text-success' : 'text-secondary'">
              ✔
            </span>
            <span [ngClass]="hasNumberOrSymbol ? 'text-success' : 'text-muted'">
              One number or symbol
            </span>
          </div>

        </div>

      </div>
    </div>

  </div>

</div>
