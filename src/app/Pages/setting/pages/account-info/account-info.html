<div class="container-fluid px-4 py-3">

  <!-- PAGE TITLE -->
  <div class="mb-4">
    <h3 class="fw-bold title mb-1">Account Settings</h3>
    <small class="subtitle">Manage your profile information</small>
  </div>

  <div class="row g-4">

    <!-- LEFT PROFILE CARD -->
    <div class="col-lg-4">
      <div class="card-dark text-center p-4 h-100">

        <div class="position-relative mb-3">
          <img [src]="user.avatar"
               class="rounded-circle border border-3 border-white shadow"
               width="110" height="110"
               style="object-fit: cover;">

          <label class="position-absolute bottom-0 end-0 bg-white rounded-circle shadow d-flex align-items-center justify-content-center"
                 style="width:30px;height:30px;cursor:pointer;">
            ✏️
            <input type="file" class="d-none">
          </label>
        </div>

        <h5 class="fw-bold mb-1">{{ user.name }}</h5>
        <small class="text-muted">{{ user.email }}</small>

        <!-- gradient badge -->
        <div class="mt-3 px-3 py-1 rounded-pill"
             style="background:linear-gradient(90deg,#8b5cf6,#ec4899);color:white;font-size:12px;">
          Creator Plan
        </div>

      </div>
    </div>

    <!-- RIGHT FORM CARD -->
    <div class="col-lg-8">
      <div class="card-dark p-4 h-100">

        <h5 class="fw-bold mb-4">Account Details</h5>

        <div class="row g-3">

          <div class="col-md-6">
            <label class="card-label">Full Name</label>
            <input [(ngModel)]="user.name"
                   class="form-control bg-transparent text-white border"
                   style="border-color: rgba(255,255,255,0.08);">
          </div>

          <div class="col-md-6">
            <label class="card-label">Username</label>
            <input [(ngModel)]="user.username"
                   class="form-control bg-transparent text-white border"
                   style="border-color: rgba(255,255,255,0.08);">
          </div>

          <div class="col-md-6">
            <label class="card-label">Email</label>
            <input [(ngModel)]="user.email"
                   class="form-control bg-transparent text-white border"
                   style="border-color: rgba(255,255,255,0.08);">
          </div>

          <div class="col-md-6">
            <label class="card-label">Mobile</label>
            <input [(ngModel)]="user.mobile"
                   class="form-control bg-transparent text-white border"
                   style="border-color: rgba(255,255,255,0.08);">
          </div>

          <div class="col-md-4">
            <label class="card-label">Age</label>
            <input [(ngModel)]="user.age"
                   class="form-control bg-transparent text-white border"
                   style="border-color: rgba(255,255,255,0.08);">
          </div>

          <div class="col-md-8">
            <label class="card-label">Birth Date</label>
            <input [(ngModel)]="user.dob" type="date"
                   class="form-control bg-transparent text-white border"
                   style="border-color: rgba(255,255,255,0.08);">
          </div>

        </div>

        <div class="text-end mt-4">
          <button class="btn btn-glow px-4 py-2 fw-semibold"
                  (click)="updateProfile()">
            Save Changes
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
