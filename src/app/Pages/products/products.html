<div class="container ">

 <div class="d-flex justify-content-between align-items-center mb-1">
  <div>
    <h2 class="fw-bold text-dark mb-0" style="font-size: 28px;">Products</h2>
       <small class="text-muted" style="font-size: 14px;">Manage your product inventory and pricing.</small>
  </div>

  <div class="d-flex align-items-center gap-2">
    
    <!-- 🔍 Search -->
    <input
      type="text"
      class="form-control shadow-sm"
      placeholder="Search products..."
      style="width: 250px;"
      (input)="onSearch($event)"
    />

    <!-- ➕ Button -->
    <button class="btn btn-primary shadow-sm "
            (click)="openModal()">
      + Add Product
    </button>

  </div>
</div>

  <!-- 📊 Grid -->
  <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
    <div class="card-body p-0">
     <ag-grid-angular
  #agGrid
  [theme]="'legacy'"
  class="ag-theme-quartz"
  style="width: 100%; height: 520px;"
  [rowData]="rowData"
  [columnDefs]="columnDefs"
   [pagination]="true"
      [paginationPageSize]="50">>
</ag-grid-angular>
    </div>
  </div>

  <!-- 🪟 Modal -->
  <div class="modal fade show d-block"
       tabindex="-1"
       *ngIf="showModal"
       style="background-color: rgba(0,0,0,0.4); backdrop-filter: blur(5px);"
    >

    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content border-0 shadow-lg rounded-4">

        <div class="modal-header border-bottom-0 pb-0 pt-4 px-4">
          <h5 class="modal-title fw-bold fs-4 text-dark">Create New Product</h5>
          <button type="button"
                  class="btn-close shadow-none"
                  (click)="closeModal()"></button>
        </div>

        <div class="modal-body px-4 pt-4">

          <div class="form-floating mb-3">
            <input type="text"
                   class="form-control bg-light border-0 shadow-none"
                   id="productTitle"
                   placeholder="Title"
                   [(ngModel)]="newProduct.title">
            <label for="productTitle" class="text-muted">Product Title</label>
          </div>

          <div class="form-floating mb-3">
            <input type="number"
                   class="form-control bg-light border-0 shadow-none"
                   id="productPrice"
                   placeholder="Price"
                   [(ngModel)]="newProduct.price">
            <label for="productPrice" class="text-muted">Price ($)</label>
          </div>

          <div class="form-floating mb-2">
            <input type="text"
                   class="form-control bg-light border-0 shadow-none"
                   id="productFileUrl"
                   placeholder="File URL"
                   [(ngModel)]="newProduct.fileUrl">
            <label for="productFileUrl" class="text-muted">File URL</label>
          </div>

        </div>

        <div class="modal-footer border-top-0 pt-0 px-4 pb-4">
          <button class="btn btn-light px-4 fw-medium" (click)="closeModal()">Cancel</button>
          <button class="btn btn-primary px-4 shadow-sm fw-medium" (click)="createProduct()">Create Product</button>
        </div>

      </div>
    </div>
  </div>

</div>
